<!DOCTYPE html>
<html>

<head>
    <title>AI Translator Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="app">

        <header>
            <h1>🌍 AI Translator Pro</h1>
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="translator-container">

            <!-- LEFT PANEL -->
            <div class="panel left">
                <div class="panel-header">
                    <select id="languageSelect">
                        {% for name, code in languages.items() %}
                        <option value="{{ code }}">{{ name }}</option>
                        {% endfor %}
                    </select>
                    <button onclick="startListening()">🎙</button>
                </div>

                <textarea id="inputText" placeholder="Enter text..."></textarea>

                <div class="panel-actions">
                    <button onclick="clearText()">Clear</button>
                </div>
            </div>

            <!-- SWAP BUTTON -->
            <div class="swap-container">
                <button class="swap-btn" onclick="swapLanguages()">⇄</button>
            </div>

            <!-- RIGHT PANEL -->
            <div class="panel right">
                <div class="panel-header">
                    <span>Translation</span>
                    <button onclick="copyText()">📋</button>
                </div>

                <div id="translated" class="output"></div>

                <div class="panel-actions">
                    <button onclick="speakText()">🔊 Speak</button>
                    <label>
                        <input type="checkbox" id="autoSpeak">
                        Auto Speak
                    </label>
                </div>

                <div class="speed-control">
                    Speed:
                    <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="1">
                </div>
            </div>

        </div>

        <div id="loader" class="loader">Translating...</div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
